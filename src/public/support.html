<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Support | Velocity Enterprise</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gray-50 text-gray-900 font-sans">
    <header class="bg-white border-b border-gray-200">
        <div class="max-w-7xl mx-auto px-4 py-6 flex justify-between items-center">
            <a href="/" class="text-2xl font-extrabold text-red-600">Velocity Enterprise</a>
            <nav class="space-x-8">
                <a href="/plans" class="font-medium hover:text-red-600">Plans</a>
                <a href="/support" class="font-medium text-red-600">Support</a>
                <a href="/about" class="font-medium hover:text-red-600">About</a>
            </nav>
        </div>
    </header>
    <main class="max-w-4xl mx-auto px-4 py-20 text-center">
        <h1 class="text-4xl font-bold mb-8">How can we help?</h1>
        <p class="text-xl mb-12 text-gray-600">Our support team is available 24/7 for our enterprise customers.</p>
        <div class="grid md:grid-cols-2 gap-8 text-left">
            <div class="bg-white p-8 border border-gray-200">
                <h2 class="text-2xl font-bold mb-4">Technical Support</h2>
                <p class="mb-4">Call us: 1800 VELOCITY (1800 835 624)</p>
                <p>Email: support@example.com</p>
            </div>
            <div class="bg-white p-8 border border-gray-200">
                <h2 class="text-2xl font-bold mb-4">Billing Inquiries</h2>
                <p class="mb-4">Call us: 1800 VELOCITY (Option 2)</p>
                <p>Email: billing@example.com</p>
            </div>
        </div>
    </main>
</body>
</html>
